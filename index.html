<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rebbi Shirt Orders</title>
    <style>
      :root {
        --bg: #f5f8ff;
        --panel: #ffffff;
        --panel-alt: #eef4ff;
        --ink: #314156;
        --muted: #66758a;
        --line: #c8d7ee;
        --accent: #6d9ee8;
        --accent-deep: #24478f;
        --accent-soft: #dfe9ff;
        --good: #24478f;
        --shadow: 0 22px 60px rgba(36, 71, 143, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }

      .hero {
        display: grid;
        gap: 22px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: 0 10px 30px rgba(36, 71, 143, 0.06);
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 20px;
        flex-wrap: wrap;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      .brand-copy {
        display: grid;
        gap: 4px;
      }

      .logo {
        display: block;
        width: min(220px, 42vw);
        height: auto;
      }

      .brand-kicker {
        margin: 0;
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent-deep);
      }

      .brand-title {
        margin: 0;
        font-size: 1.5rem;
        line-height: 1;
        font-weight: 650;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 3rem);
        line-height: 1;
        font-weight: 700;
      }

      .hero p {
        margin: 0;
        max-width: 720px;
        color: var(--muted);
        font-size: 1.02rem;
      }

      .stats {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-top: 22px;
      }

      .stat {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.84rem;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 700;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin: 24px 0 18px;
        flex-wrap: wrap;
      }

      .toolbar-right {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toggle {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--ink);
      }

      .toggle input {
        margin: 0;
        min-width: 18px;
        min-height: 18px;
      }

      .toggle-copy {
        display: grid;
        gap: 2px;
      }

      .toggle-note {
        font-size: 0.8rem;
        color: var(--muted);
      }

      button {
        border: 0;
        border-radius: 999px;
        background: var(--accent-deep);
        color: white;
        padding: 11px 16px;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .status {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .orders {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .saved-discounts {
        margin-bottom: 18px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--panel);
        box-shadow: 0 10px 30px rgba(36, 71, 143, 0.05);
      }

      .saved-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: end;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .saved-head h2 {
        margin: 0;
        font-size: 1.05rem;
      }

      .saved-head p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .saved-list {
        display: grid;
        gap: 10px;
      }

      .saved-empty {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .saved-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(238, 244, 255, 0.7), rgba(255, 255, 255, 0.95));
      }

      .saved-meta {
        display: grid;
        gap: 4px;
      }

      .saved-phone {
        font-weight: 700;
      }

      .saved-code {
        color: var(--accent-deep);
        font-size: 0.92rem;
      }

      .saved-updated {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .empty {
        border: 1px dashed var(--line);
        background: var(--panel);
        border-radius: 22px;
        padding: 40px 24px;
        text-align: center;
        color: var(--muted);
      }

      .order {
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(244, 248, 255, 0.98)),
          var(--panel);
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 14px 30px rgba(36, 71, 143, 0.08);
      }

      .order-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .order-meta {
        display: grid;
        gap: 4px;
      }

      .order-id {
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .order-total {
        margin: 14px 0 0;
        padding-top: 12px;
        border-top: 1px solid rgba(200, 215, 238, 0.9);
        font-size: 1rem;
        font-weight: 700;
        color: var(--accent-deep);
      }

      .order-time {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .caller {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 11px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent-soft), #edf3ff);
        color: var(--accent-deep);
        font-size: 0.86rem;
        font-weight: 600;
      }

      .shipping {
        display: grid;
        gap: 6px;
        margin: 0 0 14px;
        padding: 12px 13px;
        border-radius: 14px;
        border: 1px solid rgba(109, 158, 232, 0.24);
        background: rgba(238, 244, 255, 0.72);
      }

      .shipping-title {
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent-deep);
      }

      .shipping-lines,
      .shipping-meta {
        margin: 0;
        color: var(--muted);
        font-size: 0.86rem;
        line-height: 1.4;
      }

      .shipping-lines {
        color: var(--ink);
        font-weight: 600;
      }

      .items {
        display: grid;
        gap: 10px;
      }

      .item {
        padding: 12px 13px;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(238, 244, 255, 0.95), rgba(255, 255, 255, 0.9));
        border: 1px solid rgba(109, 158, 232, 0.2);
      }

      .item-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }

      .item-title {
        font-weight: 700;
        font-size: 0.96rem;
        line-height: 1.25;
      }

      .qty {
        color: white;
        font-weight: 700;
        font-size: 0.8rem;
        background: var(--accent-deep);
        border-radius: 999px;
        padding: 4px 8px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .item-line {
        margin: 6px 0 0;
        font-size: 0.82rem;
        color: var(--muted);
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 5px 8px;
        font-size: 0.78rem;
        background: rgba(255, 255, 255, 0.88);
      }

      @media (max-width: 1040px) {
        .orders {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .shell {
          padding: 18px 14px 40px;
        }

        .orders {
          grid-template-columns: 1fr;
        }

        .hero,
        .order {
          border-radius: 22px;
          padding: 16px;
        }

        .logo {
          width: min(170px, 58vw);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="brand">
          <img class="logo" id="brand-logo" alt="A.I. Stone" />
          <div class="brand-copy">
            <p class="brand-kicker">Order Desk</p>
            <p class="brand-title">Phone Orders Dashboard</p>
          </div>
        </div>
        <div>
          <h1>Incoming Orders</h1>
          <p>Review callers, quantities, and shirt details in one place.</p>
        </div>
        <section class="stats">
          <article class="stat">
            <div class="stat-label">Orders</div>
            <div class="stat-value" id="order-count">0</div>
          </article>
          <article class="stat">
            <div class="stat-label">Shirts</div>
            <div class="stat-value" id="shirt-count">0</div>
          </article>
          <article class="stat">
            <div class="stat-label">Revenue</div>
            <div class="stat-value" id="revenue-total" style="font-size:1.4rem">$0.00</div>
          </article>
          <article class="stat">
            <div class="stat-label">Last Refresh</div>
            <div class="stat-value" id="last-refresh" style="font-size:1.15rem">Never</div>
          </article>
        </section>
      </section>

      <section class="toolbar">
        <div class="status" id="status">Loading orders…</div>
        <div class="toolbar-right">
          <button class="secondary" id="testivr-button">Test IVR</button>
          <button class="secondary" id="logout-button" type="button">Log out</button>
          <label class="toggle" for="submit-order-toggle">
            <input type="checkbox" id="submit-order-toggle" />
            <span class="toggle-copy">
              <span>Submit orders after draft</span>
              <span class="toggle-note" id="submit-order-note">Loading current setting...</span>
            </span>
          </label>
          <label class="toggle" for="skip-cc-toggle">
            <input type="checkbox" id="skip-cc-toggle" />
            <span class="toggle-copy">
              <span>Skip credit card payment</span>
              <span class="toggle-note" id="skip-cc-note">Loading current setting...</span>
            </span>
          </label>
          <label class="toggle" for="penny-cc-toggle">
            <input type="checkbox" id="penny-cc-toggle" />
            <span class="toggle-copy">
              <span>Charge $0.01 only</span>
              <span class="toggle-note" id="penny-cc-note">Loading current setting...</span>
            </span>
          </label>
          <label class="status">
            <input type="checkbox" id="auto-refresh" checked />
            Auto refresh
          </label>
          <button class="secondary" id="refresh-button">Refresh now</button>
        </div>
      </section>

      <section class="saved-discounts">
        <div class="saved-head">
          <div>
            <h2>Saved Coupon Codes</h2>
            <p>Phone numbers with coupon codes currently saved for ordering.</p>
          </div>
        </div>
        <div class="saved-list" id="saved-discounts"></div>
      </section>

      <section class="orders" id="orders"></section>
    </main>

    <script>
      const ordersEl = document.getElementById("orders");
      const orderCountEl = document.getElementById("order-count");
      const shirtCountEl = document.getElementById("shirt-count");
      const revenueEl = document.getElementById("revenue-total");
      const lastRefreshEl = document.getElementById("last-refresh");
      const statusEl = document.getElementById("status");
      const savedDiscountsEl = document.getElementById("saved-discounts");
      const testIvrButton = document.getElementById("testivr-button");
      const logoutButton = document.getElementById("logout-button");
      const refreshButton = document.getElementById("refresh-button");
      const autoRefresh = document.getElementById("auto-refresh");
      const brandLogo = document.getElementById("brand-logo");
      const submitOrderToggle = document.getElementById("submit-order-toggle");
      const submitOrderNote = document.getElementById("submit-order-note");
      const skipCcToggle = document.getElementById("skip-cc-toggle");
      const skipCcNote = document.getElementById("skip-cc-note");
      const pennyCcToggle = document.getElementById("penny-cc-toggle");
      const pennyCcNote = document.getElementById("penny-cc-note");
      let timer = null;
      const appPrefix = window.location.pathname === "/rso" || window.location.pathname.startsWith("/rso/") ? "/rso" : "";

      function appUrl(path) {
        return `${appPrefix}${path}`;
      }

      brandLogo.src = appUrl("/logo-aistone.png");

      function formatTime(value) {
        if (!value) return "Unknown";
        const date = new Date(value);
        return new Intl.DateTimeFormat(undefined, {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(date);
      }

      function totalShirts(orders) {
        return orders.reduce((sum, order) => {
          const perOrder = Array.isArray(order.items)
            ? order.items.reduce((inner, item) => inner + Number(item.quantity || 0), 0)
            : Number(order.totalQuantity || 0);
          return sum + perOrder;
        }, 0);
      }

      function totalRevenue(orders) {
        return orders.reduce((sum, order) => sum + Number(order.totalPrice || 0), 0);
      }

      function formatMoney(amount) {
        return new Intl.NumberFormat(undefined, {
          style: "currency",
          currency: "USD"
        }).format(Number(amount || 0));
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function redirectToLogin() {
        window.location.href = appUrl(`/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`);
      }

      function setSettingsUi(settings) {
        const submitEnabled = Boolean(settings && settings.submitShopifyOrder);
        const skipCcEnabled = Boolean(settings && settings.skipCreditCardPayment);
        const pennyEnabled = Boolean(settings && settings.chargeCreditCardOneCent);

        submitOrderToggle.checked = submitEnabled;
        submitOrderNote.textContent = submitEnabled ? "Live IVR will submit real Shopify orders." : "Draft-only mode is on.";

        skipCcToggle.checked = skipCcEnabled;
        skipCcNote.textContent = skipCcEnabled ? "Twilio Pay is bypassed for live and test IVR." : "Cards will still be collected.";

        pennyCcToggle.checked = pennyEnabled;
        pennyCcToggle.disabled = skipCcEnabled;
        pennyCcNote.textContent = skipCcEnabled
          ? "Disabled while card collection is skipped."
          : pennyEnabled
            ? "Live and test IVR will collect only $0.01."
            : "The full order total will be charged.";
      }

      async function saveSettings() {
        const payload = new URLSearchParams({
          submitShopifyOrder: submitOrderToggle.checked ? "true" : "false",
          skipCreditCardPayment: skipCcToggle.checked ? "true" : "false",
          chargeCreditCardOneCent: !skipCcToggle.checked && pennyCcToggle.checked ? "true" : "false"
        });

        submitOrderToggle.disabled = true;
        skipCcToggle.disabled = true;
        pennyCcToggle.disabled = true;
        submitOrderNote.textContent = "Saving...";
        skipCcNote.textContent = "Saving...";
        pennyCcNote.textContent = "Saving...";

        try {
          const response = await fetch(appUrl("/api/admin/settings"), {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: payload
          });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }

          const settings = await response.json();
          setSettingsUi(settings);
        } catch (_error) {
          await loadSettings();
          statusEl.textContent = "Could not save settings.";
          return;
        } finally {
          submitOrderToggle.disabled = false;
          skipCcToggle.disabled = false;
          pennyCcToggle.disabled = Boolean(skipCcToggle.checked);
        }
      }

      function renderEmpty() {
        ordersEl.innerHTML = '<article class="empty">No orders yet. When callers place orders, they will appear here.</article>';
      }

      function renderSavedDiscounts(entries) {
        if (!Array.isArray(entries) || !entries.length) {
          savedDiscountsEl.innerHTML = '<p class="saved-empty">No saved coupon codes.</p>';
          return;
        }

        savedDiscountsEl.innerHTML = entries
          .map(
            (entry) => `
              <article class="saved-card">
                <div class="saved-meta">
                  <div class="saved-phone">${escapeHtml(entry.caller || "Unknown caller")}</div>
                  <div class="saved-code">Code ${escapeHtml(entry.code || "")}${entry.verified ? " · verified" : ""}</div>
                  <div class="saved-updated">Updated ${escapeHtml(formatTime(entry.updatedAt))}</div>
                </div>
                <button class="secondary" type="button" data-remove-caller="${escapeHtml(entry.caller || "")}">Remove coupon</button>
              </article>
            `
          )
          .join("");
      }

      function chip(label, value) {
        if (value === undefined || value === null || value === "") return "";
        return `<span class="chip">${label}: ${value}</span>`;
      }

      function buildSku(item) {
        const rawStyle = String(item.style || "").trim().toLowerCase();
        const style = rawStyle === "khoss seedish" ? "chassidish" : rawStyle;
        const rawPocket = String(item.pocket || "").trim().toLowerCase();
        const rawCuff = String(item.cuff || "").trim().toLowerCase();
        const rawSleeve = String(item.sleeve || "").trim().toLowerCase();
        const categoryCode = item.category === "mens" ? "M" : "B";
        const collarMap = {
          spread: "S",
          cutaway: "C",
          pointy: "P",
          chassidish: "P"
        };
        const collarCode = collarMap[item.collar] || "S";
        const fitMap = {
          classic: "C",
          traditional: "C",
          slim: "S",
          "extra slim": "E",
          "super slim": "X",
          husky: "H"
        };
        const fitCode = fitMap[item.fit] || "C";
        const prefix = `${categoryCode}T${collarCode}${fitCode}`;
        const parts = ["DP"];

        if (style === "chassidish") parts.push("ROL");
        if (rawCuff === "french cuff") parts.push("FC");
        if (rawPocket === "with pocket") parts.push("PKT");
        if (rawSleeve === "short sleeve") parts.push("SS");

        const sizeText = String(item.size || "");
        const isHalf = sizeText.includes(".5");
        const whole = sizeText.replace(".5", "");
        const sizeSegment =
          item.category === "boys"
            ? whole
            : rawSleeve === "short sleeve"
              ? `${whole}${isHalf ? "H" : ""}`
              : `${whole}${isHalf ? "H" : ""}${item.sleeve}`;

        parts.push(sizeSegment);
        return [prefix, ...parts].join("-");
      }

      function addressLines(address) {
        if (!address || typeof address !== "object") return [];
        return [
          address.name,
          address.company,
          [address.address1, address.address2].filter(Boolean).join(", "),
          [address.city, address.provinceCode || address.province, address.zip].filter(Boolean).join(", "),
          address.country
        ].filter(Boolean);
      }

      function renderShippingAddress(order) {
        const shipping = order.shippingAddress && typeof order.shippingAddress === "object" ? order.shippingAddress : null;
        if (!shipping) {
          return `
            <section class="shipping">
              <div class="shipping-title">Shipping Address</div>
              <p class="shipping-meta">No shipping address captured.</p>
            </section>
          `;
        }

        const lines = addressLines(shipping.address);
        const spoken = String(shipping.raw || "").trim();
        const displayLines = lines.length ? lines : spoken ? [spoken] : [];
        const linkedPhone = shipping.linkedCallerPhone && shipping.linkedCallerPhone !== shipping.lookupPhone
          ? ` · linked to caller ${escapeHtml(shipping.linkedCallerPhone)}`
          : "";
        const customer = shipping.customer?.displayName ? ` · ${escapeHtml(shipping.customer.displayName)}` : "";
        const source = shipping.source === "spoken"
          ? "Spoken by caller"
          : shipping.lookupPhone
            ? `Shopify lookup ${escapeHtml(shipping.lookupPhone)}`
            : "Saved address";
        const reviewNote = shipping.status === "needs-review" ? " · needs staff review" : "";

        return `
          <section class="shipping">
            <div class="shipping-title">Shipping Address</div>
            <p class="shipping-lines">${displayLines.length ? displayLines.map(escapeHtml).join("<br>") : "Address details unavailable"}</p>
            <p class="shipping-meta">${source}${customer}${linkedPhone}${reviewNote}</p>
          </section>
        `;
      }

      function renderOrders(orders) {
        if (!orders.length) {
          renderEmpty();
          return;
        }

        ordersEl.innerHTML = orders
          .map((order) => {
            const items = Array.isArray(order.items) ? order.items : [];
            return `
              <article class="order">
                <div class="order-head">
                  <div class="order-meta">
                    <div class="order-id">Order record: ${order.id || "Order"}</div>
                    <div class="order-time">${formatTime(order.createdAt)}</div>
                  </div>
                  <div class="caller">${order.caller || "Unknown caller"}</div>
                </div>
                ${renderShippingAddress(order)}
                <section class="items">
                  ${items
                    .map(
                      (item) => `
                        <article class="item">
                          <div class="item-top">
                            <div class="item-title">${item.category || ""} ${item.style || ""} twill shirt</div>
                            <div class="qty">Qty ${item.quantity || 0}</div>
                          </div>
                          <p class="item-line">SKU ${item.sku || buildSku(item)}</p>
                          <p class="item-line">Line total ${formatMoney(item.lineTotal || 0)}</p>
                          <div class="chips">
                            ${chip("Size", item.size)}
                            ${chip("Sleeve", item.sleeve)}
                            ${chip("Fit", item.fit)}
                            ${chip("Pocket", item.pocket)}
                            ${chip("Cuff", item.cuff)}
                            ${chip("Collar", item.collar)}
                          </div>
                        </article>
                      `
                    )
                    .join("")}
                </section>
                <p class="order-total">Order Total: ${formatMoney(order.totalPrice || 0)}</p>
              </article>
            `;
          })
          .join("");
      }

      async function loadOrders() {
        try {
          statusEl.textContent = "Loading orders…";
          const response = await fetch(appUrl("/api/orders"), { cache: "no-store" });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          if (!response.ok) throw new Error(`Request failed with ${response.status}`);
          const orders = await response.json();
          orderCountEl.textContent = String(orders.length);
          shirtCountEl.textContent = String(totalShirts(orders));
          revenueEl.textContent = formatMoney(totalRevenue(orders));
          lastRefreshEl.textContent = new Date().toLocaleTimeString();
          statusEl.textContent = orders.length ? "Orders loaded." : "No orders yet.";
          renderOrders(orders);
        } catch (error) {
          statusEl.textContent = `Could not load orders: ${error.message}`;
          if (!ordersEl.innerHTML) {
            renderEmpty();
          }
        }
      }

      async function loadSavedDiscounts() {
        try {
          const response = await fetch(appUrl("/api/admin/caller-discounts"), { cache: "no-store" });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }

          renderSavedDiscounts(await response.json());
        } catch (_error) {
          savedDiscountsEl.innerHTML = '<p class="saved-empty">Could not load saved coupon codes.</p>';
        }
      }

      async function removeSavedDiscount(caller) {
        if (!caller) {
          return;
        }

        statusEl.textContent = `Removing saved coupon for ${caller}…`;
        try {
          const payload = new URLSearchParams({ caller });
          const response = await fetch(appUrl("/api/admin/caller-discounts/clear"), {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: payload
          });

          if (response.status === 401) {
            redirectToLogin();
            return;
          }

          if (!response.ok) {
            throw new Error(`Request failed with ${response.status}`);
          }

          statusEl.textContent = `Removed saved coupon for ${caller}.`;
          await loadSavedDiscounts();
        } catch (error) {
          statusEl.textContent = `Could not remove saved coupon: ${error.message}`;
        }
      }

      async function loadSettings() {
        try {
          const response = await fetch(appUrl("/api/admin/settings"), { cache: "no-store" });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          const settings = await response.json();
          setSettingsUi(settings);
        } catch (_error) {
          setSettingsUi({
            submitShopifyOrder: false,
            skipCreditCardPayment: false,
            chargeCreditCardOneCent: false
          });
          submitOrderNote.textContent = "Could not load settings.";
          skipCcNote.textContent = "Could not load settings.";
          pennyCcNote.textContent = "Could not load settings.";
        }
      }

      function setAutoRefresh() {
        if (timer) clearInterval(timer);
        if (autoRefresh.checked) {
          timer = setInterval(() => {
            loadOrders();
            loadSavedDiscounts();
          }, 15000);
        }
      }

      refreshButton.addEventListener("click", () => {
        loadOrders();
        loadSavedDiscounts();
      });
      testIvrButton.addEventListener("click", () => {
        window.location.href = appUrl("/testivr");
      });
      logoutButton.addEventListener("click", () => {
        window.location.href = appUrl("/logout");
      });
      autoRefresh.addEventListener("change", setAutoRefresh);
      submitOrderToggle.addEventListener("change", saveSettings);
      skipCcToggle.addEventListener("change", () => {
        if (skipCcToggle.checked) {
          pennyCcToggle.checked = false;
        }
        saveSettings();
      });
      pennyCcToggle.addEventListener("change", saveSettings);
      savedDiscountsEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-remove-caller]");
        if (!button) return;
        removeSavedDiscount(button.getAttribute("data-remove-caller"));
      });

      loadOrders();
      loadSavedDiscounts();
      loadSettings();
      setAutoRefresh();
    </script>
  </body>
</html>
