<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rebbi Shirt Orders</title>
    <style>
      :root {
        --bg: #f6f6f7;
        --panel: #ffffff;
        --panel-soft: #f6f6f7;
        --ink: #202223;
        --muted: #6d7175;
        --line: #e1e3e5;
        --accent: rgb(43, 49, 58);
        --accent-deep: rgb(33, 38, 45);
        --accent-soft: #e4e5e7;
        --warn: #6d7175;
        --danger: #202223;
        --danger-soft: #e4e5e7;
        --shadow: 0 14px 34px rgba(32, 34, 35, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        padding: 10px 13px;
        cursor: pointer;
        min-height: 40px;
      }

      button.secondary {
        background: var(--panel);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      button:hover {
        background: var(--accent-deep);
      }

      button.secondary:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
      }

      input:focus-visible,
      button:focus-visible,
      summary:focus-visible {
        outline: 3px solid var(--accent-soft);
        outline-offset: 2px;
        border-color: var(--accent);
      }

      button.danger {
        background: var(--danger);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .shell {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px 18px 44px;
      }

      .topbar {
        display: grid;
        grid-template-columns: auto minmax(260px, 1fr) auto;
        gap: 18px;
        align-items: center;
        margin-bottom: 18px;
      }

      .logo {
        display: block;
        width: min(190px, 36vw);
        height: auto;
      }

      .title h1 {
        margin: 0;
        font-size: 1.55rem;
        line-height: 1.1;
      }

      .title p {
        margin: 5px 0 0;
        color: var(--muted);
      }

      .menu {
        position: relative;
        justify-self: end;
      }

      .menu summary {
        list-style: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px 13px;
        min-height: 40px;
        cursor: pointer;
        font-weight: 700;
      }

      .menu summary::-webkit-details-marker {
        display: none;
      }

      .menu[open] summary {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .menu-panel {
        position: absolute;
        right: 0;
        z-index: 10;
        width: min(420px, calc(100vw - 36px));
        margin-top: 8px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        display: grid;
        gap: 12px;
      }

      .menu-actions,
      .search-row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toggle {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        align-items: start;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .toggle input {
        width: 18px;
        height: 18px;
        margin: 2px 0 0;
      }

      .toggle-copy {
        display: grid;
        gap: 2px;
      }

      .toggle-note,
      .status,
      .muted {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .summary-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-bottom: 16px;
      }

      .stat {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      .stat-value {
        margin-top: 7px;
        font-size: 1.45rem;
        font-weight: 800;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 420px) 1fr auto;
        gap: 12px;
        align-items: center;
        margin: 0 0 16px;
      }

      .search {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        padding: 0 12px;
      }

      .orders {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
        align-items: stretch;
      }

      .order-card,
      .detail-panel,
      .saved-discounts {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .order-card {
        width: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        padding: 13px;
        text-align: left;
        color: var(--ink);
        cursor: pointer;
      }

      .order-card:hover,
      .order-card.active {
        border-color: var(--accent);
        box-shadow: 0 16px 36px rgba(32, 34, 35, 0.12);
      }

      .card-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: start;
      }

      .order-number {
        font-size: 1.04rem;
        font-weight: 800;
        color: var(--accent-deep);
      }

      .card-meta {
        display: grid;
        gap: 4px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        background: var(--panel-soft);
        border: 1px solid var(--line);
        padding: 4px 9px;
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 700;
      }

      .pill:first-child {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-deep);
      }

      .pill.refunded {
        color: var(--ink);
        background: var(--danger-soft);
        border-color: var(--line);
      }

      .card-actions {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }

      .detail-panel {
        width: min(980px, calc(100vw - 28px));
        max-height: calc(100vh - 48px);
        padding: 18px;
        overflow: auto;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 24px 14px;
        background: rgba(32, 34, 35, 0.42);
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .close-button {
        width: 40px;
        min-width: 40px;
        height: 40px;
        padding: 0;
        border-radius: 999px;
        line-height: 1;
        font-size: 1.4rem;
        font-weight: 700;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(240px, 320px);
        gap: 16px;
      }

      .detail-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 14px;
      }

      .detail-title {
        margin: 0;
        font-size: 1.25rem;
      }

      .section-title {
        margin: 0 0 8px;
        font-size: 0.9rem;
        text-transform: uppercase;
        color: var(--muted);
      }

      .item-list {
        display: grid;
        gap: 10px;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        padding: 12px;
      }

      .item-top,
      .line {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .item-title {
        font-weight: 800;
      }

      .qty {
        color: var(--accent);
        font-weight: 800;
      }

      .item-line,
      .side p {
        margin: 7px 0 0;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.4;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 9px;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 5px 7px;
        font-size: 0.78rem;
        background: var(--panel);
      }

      .side {
        display: grid;
        gap: 12px;
      }

      .side-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--panel-soft);
      }

      .total {
        margin: 14px 0 0;
        padding-top: 12px;
        border-top: 1px solid var(--line);
        font-weight: 800;
        color: var(--accent);
      }

      .saved-discounts {
        margin-top: 12px;
        padding: 12px;
        box-shadow: none;
      }

      .saved-list {
        display: grid;
        gap: 8px;
      }

      .saved-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
      }

      .empty {
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 28px 18px;
        color: var(--muted);
        text-align: center;
        background: var(--panel);
      }

      @media (max-width: 980px) {
        .topbar,
        .toolbar,
        .detail-grid {
          grid-template-columns: 1fr;
        }

        .menu {
          justify-self: stretch;
        }

        .menu summary {
          width: 100%;
          text-align: center;
        }

        .menu-panel {
          left: 0;
          right: auto;
        }
      }

      @media (max-width: 720px) {
        .shell {
          padding: 18px 12px 36px;
        }

        .summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .logo {
          width: min(160px, 58vw);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <img class="logo" id="brand-logo" alt="A.I. Stone" />
        <div class="title">
          <h1>Phone Orders Dashboard</h1>
          <p id="status">Loading orders...</p>
        </div>
        <details class="menu" id="settings-menu">
          <summary>Menu</summary>
          <div class="menu-panel">
            <div class="menu-actions">
              <button class="secondary" id="testivr-button" type="button">Test IVR</button>
              <button class="secondary" id="refresh-button" type="button">Refresh</button>
              <button class="secondary" id="logout-button" type="button">Log out</button>
            </div>
            <label class="toggle" for="submit-order-toggle">
              <input type="checkbox" id="submit-order-toggle" />
              <span class="toggle-copy">
                <strong>Submit Shopify orders</strong>
                <span class="toggle-note" id="submit-order-note">Loading current setting...</span>
              </span>
            </label>
            <label class="toggle" for="skip-cc-toggle">
              <input type="checkbox" id="skip-cc-toggle" />
              <span class="toggle-copy">
                <strong>Skip credit card payment</strong>
                <span class="toggle-note" id="skip-cc-note">Loading current setting...</span>
              </span>
            </label>
            <label class="toggle" for="penny-cc-toggle">
              <input type="checkbox" id="penny-cc-toggle" />
              <span class="toggle-copy">
                <strong>Charge $0.01 only</strong>
                <span class="toggle-note" id="penny-cc-note">Loading current setting...</span>
              </span>
            </label>
            <label class="toggle" for="auto-refresh">
              <input type="checkbox" id="auto-refresh" checked />
              <span class="toggle-copy">
                <strong>Auto refresh</strong>
                <span class="toggle-note">Refresh dashboard data every 15 seconds.</span>
              </span>
            </label>
            <section class="saved-discounts">
              <h2 class="section-title">Saved Coupon Codes</h2>
              <div class="saved-list" id="saved-discounts"></div>
            </section>
          </div>
        </details>
      </header>

      <section class="summary-grid">
        <article class="stat">
          <div class="stat-label">Orders</div>
          <div class="stat-value" id="order-count">0</div>
        </article>
        <article class="stat">
          <div class="stat-label">Shirts</div>
          <div class="stat-value" id="shirt-count">0</div>
        </article>
        <article class="stat">
          <div class="stat-label">Revenue</div>
          <div class="stat-value" id="revenue-total">$0.00</div>
        </article>
        <article class="stat">
          <div class="stat-label">Last Refresh</div>
          <div class="stat-value" id="last-refresh">Never</div>
        </article>
      </section>

      <section class="toolbar">
        <input class="search" id="order-search" type="search" placeholder="Search Shopify order number" />
        <div class="status" id="result-count"></div>
      </section>

      <section class="dashboard">
        <div class="orders" id="orders"></div>
      </section>
    </main>
    <div class="modal-backdrop" id="order-modal" hidden>
      <aside class="detail-panel" id="order-detail" role="dialog" aria-modal="true" aria-labelledby="detail-title"></aside>
    </div>

    <script>
      const ordersEl = document.getElementById("orders");
      const detailEl = document.getElementById("order-detail");
      const orderModalEl = document.getElementById("order-modal");
      const orderCountEl = document.getElementById("order-count");
      const shirtCountEl = document.getElementById("shirt-count");
      const revenueEl = document.getElementById("revenue-total");
      const lastRefreshEl = document.getElementById("last-refresh");
      const statusEl = document.getElementById("status");
      const resultCountEl = document.getElementById("result-count");
      const savedDiscountsEl = document.getElementById("saved-discounts");
      const searchEl = document.getElementById("order-search");
      const testIvrButton = document.getElementById("testivr-button");
      const logoutButton = document.getElementById("logout-button");
      const refreshButton = document.getElementById("refresh-button");
      const autoRefresh = document.getElementById("auto-refresh");
      const brandLogo = document.getElementById("brand-logo");
      const submitOrderToggle = document.getElementById("submit-order-toggle");
      const submitOrderNote = document.getElementById("submit-order-note");
      const skipCcToggle = document.getElementById("skip-cc-toggle");
      const skipCcNote = document.getElementById("skip-cc-note");
      const pennyCcToggle = document.getElementById("penny-cc-toggle");
      const pennyCcNote = document.getElementById("penny-cc-note");
      const appPrefix = window.location.pathname === "/rso" || window.location.pathname.startsWith("/rso/") ? "/rso" : "";
      const shopifyLaunchSearch = (() => {
        const params = new URLSearchParams(window.location.search);
        return params.has("hmac") && (params.has("shop") || params.has("host")) ? window.location.search : "";
      })();
      let timer = null;
      let ordersState = [];
      let selectedOrderId = "";
      let refundingOrderId = "";

      function appUrl(path) {
        return `${appPrefix}${path}`;
      }

      function authorizedAppUrl(path) {
        if (!shopifyLaunchSearch) {
          return appUrl(path);
        }

        const url = new URL(appUrl(path), window.location.origin);
        const launchParams = new URLSearchParams(shopifyLaunchSearch);
        for (const [key, value] of launchParams.entries()) {
          if (!url.searchParams.has(key)) {
            url.searchParams.append(key, value);
          }
        }
        return `${url.pathname}${url.search}`;
      }

      brandLogo.src = appUrl("/logo-aistone.png");

      function formatTime(value) {
        if (!value) return "Unknown";
        const date = new Date(value);
        return new Intl.DateTimeFormat(undefined, {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(date);
      }

      function formatPhone(value) {
        const digits = String(value || "").replace(/\D/g, "");
        const ten = digits.length === 11 && digits.startsWith("1") ? digits.slice(1) : digits;
        if (ten.length === 10) {
          return `(${ten.slice(0, 3)}) ${ten.slice(3, 6)}-${ten.slice(6)}`;
        }
        return String(value || "Unknown caller");
      }

      function formatMoney(amount, currency = "USD") {
        return new Intl.NumberFormat(undefined, {
          style: "currency",
          currency: currency || "USD"
        }).format(Number(amount || 0));
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function redirectToLogin() {
        window.location.href = appUrl(`/login?next=${encodeURIComponent(window.location.pathname + window.location.search)}`);
      }

      function totalShirts(orders) {
        return orders.reduce((sum, order) => {
          const perOrder = Array.isArray(order.items)
            ? order.items.reduce((inner, item) => inner + Number(item.quantity || 0), 0)
            : Number(order.totalQuantity || 0);
          return sum + perOrder;
        }, 0);
      }

      function totalRevenue(orders) {
        return orders.reduce((sum, order) => sum + Number(order.totalPrice || 0), 0);
      }

      function orderNumber(order) {
        return order.shopifyOrder?.number || order.shopifyOrderNumber || order.shopifyOrder?.name || order.shopifyDraftOrder?.name || "Not submitted";
      }

      function isRefunded(order) {
        return Boolean(order.stripeRefund?.id || order.refundedAt || String(order.shopifyOrder?.financialStatus || "").toUpperCase() === "REFUNDED");
      }

      function canRefund(order) {
        return Boolean(
          !isRefunded(order) &&
            (order.stripePaymentIntentId ||
              order.payment?.stripePaymentIntentId ||
              /^(pi|ch)_/.test(String(order.payment?.confirmationCode || "")) ||
              /^(pi|ch)_/.test(String(order.payment?.processorReference || "")))
        );
      }

      function filteredOrders() {
        const query = searchEl.value.trim().toLowerCase();
        if (!query) return ordersState;
        return ordersState.filter((order) => {
          const haystack = [
            orderNumber(order),
            order.shopifyOrder?.name,
            order.shopifyOrder?.id,
            order.shopifyDraftOrder?.name,
            order.id
          ]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();
          return haystack.includes(query);
        });
      }

      function setSettingsUi(settings) {
        const submitEnabled = Boolean(settings && settings.submitShopifyOrder);
        const skipCcEnabled = Boolean(settings && settings.skipCreditCardPayment);
        const pennyEnabled = Boolean(settings && settings.chargeCreditCardOneCent);

        submitOrderToggle.checked = submitEnabled;
        submitOrderNote.textContent = submitEnabled ? "Live IVR submits completed Shopify orders." : "Draft-only mode is on.";
        skipCcToggle.checked = skipCcEnabled;
        skipCcNote.textContent = skipCcEnabled ? "Twilio Pay is bypassed for live and test IVR." : "Cards will still be collected.";
        pennyCcToggle.checked = pennyEnabled;
        pennyCcToggle.disabled = skipCcEnabled;
        pennyCcNote.textContent = skipCcEnabled
          ? "Disabled while card collection is skipped."
          : pennyEnabled
            ? "Live and test IVR collect only $0.01."
            : "The full order total will be charged.";
      }

      async function saveSettings() {
        const payload = new URLSearchParams({
          submitShopifyOrder: submitOrderToggle.checked ? "true" : "false",
          skipCreditCardPayment: skipCcToggle.checked ? "true" : "false",
          chargeCreditCardOneCent: !skipCcToggle.checked && pennyCcToggle.checked ? "true" : "false"
        });

        submitOrderToggle.disabled = true;
        skipCcToggle.disabled = true;
        pennyCcToggle.disabled = true;
        submitOrderNote.textContent = "Saving...";
        skipCcNote.textContent = "Saving...";
        pennyCcNote.textContent = "Saving...";

        try {
          const response = await fetch(authorizedAppUrl("/api/admin/settings"), {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: payload
          });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          setSettingsUi(await response.json());
        } catch (_error) {
          await loadSettings();
          statusEl.textContent = "Could not save settings.";
        } finally {
          submitOrderToggle.disabled = false;
          skipCcToggle.disabled = false;
          pennyCcToggle.disabled = Boolean(skipCcToggle.checked);
        }
      }

      function chip(label, value) {
        if (value === undefined || value === null || value === "") return "";
        return `<span class="chip">${escapeHtml(label)}: ${escapeHtml(value)}</span>`;
      }

      function buildSku(item) {
        const rawStyle = String(item.style || "").trim().toLowerCase();
        const style = rawStyle === "khoss seedish" ? "chassidish" : rawStyle;
        const rawPocket = String(item.pocket || "").trim().toLowerCase();
        const rawCuff = String(item.cuff || "").trim().toLowerCase();
        const rawSleeve = String(item.sleeve || "").trim().toLowerCase();
        const categoryCode = item.category === "mens" ? "M" : "B";
        const collarMap = { spread: "S", cutaway: "C", pointy: "P", chassidish: "P" };
        const fitMap = { classic: "C", traditional: "C", slim: "S", "extra slim": "E", "super slim": "X", husky: "H" };
        const prefix = `${categoryCode}T${collarMap[item.collar] || "S"}${fitMap[item.fit] || "C"}`;
        const parts = ["DP"];
        if (style === "chassidish") parts.push("ROL");
        if (rawCuff === "french cuff") parts.push("FC");
        if (rawPocket === "with pocket") parts.push("PKT");
        if (rawSleeve === "short sleeve") parts.push("SS");
        const sizeText = String(item.size || "");
        const whole = sizeText.replace(".5", "");
        const half = sizeText.includes(".5") ? "H" : "";
        parts.push(item.category === "boys" || rawSleeve === "short sleeve" ? `${whole}${half}` : `${whole}${half}${item.sleeve}`);
        return [prefix, ...parts].join("-");
      }

      function addressLines(address) {
        if (!address || typeof address !== "object") return [];
        return [
          address.name,
          address.company,
          [address.address1, address.address2].filter(Boolean).join(", "),
          [address.city, address.provinceCode || address.province, address.zip].filter(Boolean).join(", "),
          address.country,
          address.phone ? formatPhone(address.phone) : ""
        ].filter(Boolean);
      }

      function renderShippingAddress(order) {
        const shipping = order.shippingAddress && typeof order.shippingAddress === "object" ? order.shippingAddress : null;
        if (!shipping) {
          return `<p>No shipping address captured.</p>`;
        }

        const lines = addressLines(shipping.address);
        const spoken = String(shipping.raw || "").trim();
        const displayLines = lines.length ? lines : spoken ? [spoken] : ["Address details unavailable"];
        const linkedPhone = shipping.linkedCallerPhone && shipping.linkedCallerPhone !== shipping.lookupPhone
          ? `<br>Linked caller: ${escapeHtml(formatPhone(shipping.linkedCallerPhone))}`
          : "";
        const customer = shipping.customer?.displayName ? `<br>${escapeHtml(shipping.customer.displayName)}` : "";
        const source = shipping.source === "spoken"
          ? "Spoken by caller"
          : shipping.lookupPhone
            ? `Saved address lookup ${escapeHtml(formatPhone(shipping.lookupPhone))}`
            : "Saved address";
        const reviewNote = shipping.status === "needs-review" ? "<br>Needs staff review" : "";
        return `
          <p>${displayLines.map(escapeHtml).join("<br>")}</p>
          <p>${source}${customer}${linkedPhone}${reviewNote}</p>
        `;
      }

      function renderOrderCard(order) {
        const selected = String(order.id || "") === selectedOrderId;
        const refunded = isRefunded(order);
        return `
          <article class="order-card${selected ? " active" : ""}" data-select-order="${escapeHtml(order.id || "")}" tabindex="0">
            <div class="card-top">
              <div>
                <div class="order-number">${escapeHtml(orderNumber(order))}</div>
                <div class="card-meta">
                  <span>${escapeHtml(formatTime(order.createdAt))}</span>
                  <span>${escapeHtml(formatPhone(order.caller))}</span>
                </div>
              </div>
              ${refunded ? '<span class="pill refunded">Refunded</span>' : ""}
            </div>
            <div class="pill-row">
              <span class="pill">${escapeHtml(formatMoney(order.totalPrice || 0, order.currencyCode || "USD"))}</span>
              <span class="pill">${Number(order.totalQuantity || 0)} shirts</span>
              ${order.shopifyOrder?.financialStatus ? `<span class="pill">${escapeHtml(order.shopifyOrder.financialStatus)}</span>` : ""}
            </div>
            <div class="card-actions">
              <span class="muted">${escapeHtml(order.shopifyOrder?.id ? "Submitted to Shopify" : "Draft or local record")}</span>
              <button class="${canRefund(order) ? "danger" : "secondary"}" type="button" data-refund-order="${escapeHtml(order.id || "")}" ${canRefund(order) && refundingOrderId !== order.id ? "" : "disabled"}>
                ${refundingOrderId === order.id ? "Canceling..." : refunded ? "Canceled & Refunded" : "Cancel & Refund"}
              </button>
            </div>
          </article>
        `;
      }

      function renderDetail(order) {
        if (!order) {
          detailEl.innerHTML = "";
          orderModalEl.hidden = true;
          return;
        }

        const items = Array.isArray(order.items) ? order.items : [];
        const wasHidden = orderModalEl.hidden;
        detailEl.innerHTML = `
          <div class="detail-head">
            <div>
              <h2 class="detail-title" id="detail-title">${escapeHtml(orderNumber(order))}</h2>
              <div class="muted">${escapeHtml(formatTime(order.createdAt))} / ${escapeHtml(formatPhone(order.caller))}</div>
            </div>
            <div class="pill-row">
              ${isRefunded(order) ? '<span class="pill refunded">Refunded</span>' : ""}
              <button class="secondary close-button" type="button" data-close-detail aria-label="Close order detail">&times;</button>
            </div>
          </div>
          <div class="detail-grid">
            <section>
              <h3 class="section-title">Ordered</h3>
              <div class="item-list">
                ${items
                  .map(
                    (item) => `
                      <article class="item">
                        <div class="item-top">
                          <div class="item-title">${escapeHtml([item.category, item.style, "twill shirt"].filter(Boolean).join(" "))}</div>
                          <div class="qty">Qty ${escapeHtml(item.quantity || 0)}</div>
                        </div>
                        <p class="item-line">SKU ${escapeHtml(item.sku || buildSku(item))}</p>
                        <p class="item-line">Line total ${escapeHtml(formatMoney(item.lineTotal || 0, order.currencyCode || "USD"))}</p>
                        <div class="chips">
                          ${chip("Size", item.size)}
                          ${chip("Sleeve", item.sleeve)}
                          ${chip("Fit", item.fit)}
                          ${chip("Pocket", item.pocket)}
                          ${chip("Cuff", item.cuff)}
                          ${chip("Collar", item.collar)}
                        </div>
                      </article>
                    `
                  )
                  .join("")}
              </div>
              <div class="total">Order Total: ${escapeHtml(formatMoney(order.totalPrice || 0, order.currencyCode || "USD"))}</div>
            </section>
            <aside class="side">
              <section class="side-card">
                <h3 class="section-title">Shipping Address</h3>
                ${renderShippingAddress(order)}
              </section>
              <section class="side-card">
                <h3 class="section-title">Details</h3>
                <p>Local record: ${escapeHtml(order.id || "")}</p>
                <p>Shopify draft: ${escapeHtml(order.shopifyDraftOrder?.name || "None")}</p>
                <p>Shopify order: ${escapeHtml(order.shopifyOrder?.name || order.shopifyOrderNumber || "Not submitted")}</p>
                <p>Stripe intent: ${escapeHtml(order.stripePaymentIntentId || order.payment?.stripePaymentIntentId || order.payment?.confirmationCode || "Not saved")}</p>
                <p>Payment: ${escapeHtml(order.payment?.result || "Unknown")} ${order.payment?.amount ? `/ ${escapeHtml(formatMoney(order.payment.amount, order.payment.currency || order.currencyCode || "USD"))}` : ""}</p>
                ${order.shopifyOrderError ? `<p>Shopify submit error: ${escapeHtml(order.shopifyOrderError)}</p>` : ""}
                ${order.shopifyRefundMarkError ? `<p>Shopify refund mark error: ${escapeHtml(order.shopifyRefundMarkError)}</p>` : ""}
                ${order.stripeRefund?.id ? `<p>Stripe refund: ${escapeHtml(order.stripeRefund.id)} (${escapeHtml(order.stripeRefund.status || "created")})</p>` : ""}
                ${order.shopifyRefundMark?.markedAt ? `<p>Shopify marked: ${escapeHtml(formatTime(order.shopifyRefundMark.markedAt))}</p>` : ""}
              </section>
            </aside>
          </div>
        `;
        orderModalEl.hidden = false;
        if (wasHidden) {
          detailEl.querySelector("[data-close-detail]")?.focus();
        }
      }

      function renderOrders() {
        const visibleOrders = filteredOrders();
        if (!visibleOrders.length) {
          ordersEl.innerHTML = '<article class="empty">No matching orders.</article>';
          resultCountEl.textContent = "0 results";
          selectedOrderId = "";
          renderDetail(null);
          return;
        }

        if (selectedOrderId && !visibleOrders.some((order) => String(order.id || "") === selectedOrderId)) {
          selectedOrderId = "";
        }

        ordersEl.innerHTML = visibleOrders.map(renderOrderCard).join("");
        resultCountEl.textContent = `${visibleOrders.length} result${visibleOrders.length === 1 ? "" : "s"}`;
        renderDetail(selectedOrderId ? ordersState.find((order) => String(order.id || "") === selectedOrderId) : null);
      }

      function renderSavedDiscounts(entries) {
        if (!Array.isArray(entries) || !entries.length) {
          savedDiscountsEl.innerHTML = '<p class="muted">No saved coupon codes.</p>';
          return;
        }

        savedDiscountsEl.innerHTML = entries
          .map(
            (entry) => `
              <article class="saved-card">
                <div>
                  <strong>${escapeHtml(formatPhone(entry.caller || ""))}</strong>
                  <div class="muted">Code ${escapeHtml(entry.code || "")}${entry.verified ? " / verified" : ""}</div>
                </div>
                <button class="secondary" type="button" data-remove-caller="${escapeHtml(entry.caller || "")}">Remove</button>
              </article>
            `
          )
          .join("");
      }

      async function loadOrders() {
        try {
          statusEl.textContent = "Loading orders...";
          const response = await fetch(authorizedAppUrl("/api/orders"), { cache: "no-store" });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          if (!response.ok) throw new Error(`Request failed with ${response.status}`);
          ordersState = await response.json();
          orderCountEl.textContent = String(ordersState.length);
          shirtCountEl.textContent = String(totalShirts(ordersState));
          revenueEl.textContent = formatMoney(totalRevenue(ordersState));
          lastRefreshEl.textContent = new Date().toLocaleTimeString();
          statusEl.textContent = ordersState.length ? "Orders loaded." : "No orders yet.";
          renderOrders();
        } catch (error) {
          statusEl.textContent = `Could not load orders: ${error.message}`;
          if (!ordersEl.innerHTML) {
            ordersEl.innerHTML = '<article class="empty">No orders loaded.</article>';
          }
        }
      }

      async function loadSavedDiscounts() {
        try {
          const response = await fetch(authorizedAppUrl("/api/admin/caller-discounts"), { cache: "no-store" });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          renderSavedDiscounts(await response.json());
        } catch (_error) {
          savedDiscountsEl.innerHTML = '<p class="muted">Could not load saved coupon codes.</p>';
        }
      }

      async function removeSavedDiscount(caller) {
        if (!caller) return;
        statusEl.textContent = `Removing saved coupon for ${formatPhone(caller)}...`;
        try {
          const response = await fetch(authorizedAppUrl("/api/admin/caller-discounts/clear"), {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({ caller })
          });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          if (!response.ok) throw new Error(`Request failed with ${response.status}`);
          statusEl.textContent = `Removed saved coupon for ${formatPhone(caller)}.`;
          await loadSavedDiscounts();
        } catch (error) {
          statusEl.textContent = `Could not remove saved coupon: ${error.message}`;
        }
      }

      async function refundOrder(orderId) {
        if (!orderId || refundingOrderId) return;
        refundingOrderId = orderId;
        renderOrders();
          statusEl.textContent = "Refunding Stripe payment...";

        try {
          const response = await fetch(authorizedAppUrl("/api/orders"), {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({ orderId })
          });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || `Request failed with ${response.status}`);
          }
          ordersState = ordersState.map((order) => (String(order.id || "") === orderId ? payload.order : order));
          statusEl.textContent = payload.order.shopifyRefundMarkError
            ? "Stripe refunded. Shopify cancel/refund record needs attention."
            : "Stripe refunded. Shopify order canceled and marked refunded.";
        } catch (error) {
          statusEl.textContent = `Could not refund order: ${error.message}`;
        } finally {
          refundingOrderId = "";
          renderOrders();
        }
      }

      async function loadSettings() {
        try {
          const response = await fetch(authorizedAppUrl("/api/admin/settings"), { cache: "no-store" });
          if (response.status === 401) {
            redirectToLogin();
            return;
          }
          setSettingsUi(await response.json());
        } catch (_error) {
          setSettingsUi({
            submitShopifyOrder: false,
            skipCreditCardPayment: false,
            chargeCreditCardOneCent: false
          });
          submitOrderNote.textContent = "Could not load settings.";
          skipCcNote.textContent = "Could not load settings.";
          pennyCcNote.textContent = "Could not load settings.";
        }
      }

      function setAutoRefresh() {
        if (timer) clearInterval(timer);
        if (autoRefresh.checked) {
          timer = setInterval(() => {
            loadOrders();
            loadSavedDiscounts();
          }, 15000);
        }
      }

      function closeDetail() {
        selectedOrderId = "";
        renderOrders();
      }

      refreshButton.addEventListener("click", () => {
        loadOrders();
        loadSavedDiscounts();
      });
      testIvrButton.addEventListener("click", () => {
        window.location.href = authorizedAppUrl("/testivr");
      });
      logoutButton.addEventListener("click", () => {
        window.location.href = appUrl("/logout");
      });
      autoRefresh.addEventListener("change", setAutoRefresh);
      submitOrderToggle.addEventListener("change", saveSettings);
      skipCcToggle.addEventListener("change", () => {
        if (skipCcToggle.checked) {
          pennyCcToggle.checked = false;
        }
        saveSettings();
      });
      pennyCcToggle.addEventListener("change", saveSettings);
      searchEl.addEventListener("input", renderOrders);
      ordersEl.addEventListener("click", (event) => {
        const refundButton = event.target.closest("[data-refund-order]");
        if (refundButton) {
          event.stopPropagation();
          refundOrder(refundButton.getAttribute("data-refund-order"));
          return;
        }

        const card = event.target.closest("[data-select-order]");
        if (!card) return;
        selectedOrderId = String(card.getAttribute("data-select-order") || "");
        renderOrders();
      });
      ordersEl.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const card = event.target.closest("[data-select-order]");
        if (!card) return;
        event.preventDefault();
        selectedOrderId = String(card.getAttribute("data-select-order") || "");
        renderOrders();
      });
      orderModalEl.addEventListener("click", (event) => {
        if (event.target === orderModalEl || event.target.closest("[data-close-detail]")) {
          closeDetail();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !orderModalEl.hidden) {
          closeDetail();
        }
      });
      savedDiscountsEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-remove-caller]");
        if (!button) return;
        removeSavedDiscount(button.getAttribute("data-remove-caller"));
      });

      loadOrders();
      loadSavedDiscounts();
      loadSettings();
      setAutoRefresh();
    </script>
  </body>
</html>
