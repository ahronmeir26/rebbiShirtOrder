<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A.I. Stone Transfers</title>
    <style>
      :root {
        --sky: #dce6f7;
        --navy: #24478f;
        --navy-deep: #1c3668;
        --ink: #2b3441;
        --muted: #6f7785;
        --workspace: #f1f3f7;
        --card: #ffffff;
        --line: #dde2ea;
        --mist: #eef3fb;
        --green-ink: #2d6d59;
        --shadow: 0 10px 26px rgba(19, 43, 84, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--workspace);
        color: var(--ink);
        font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
        padding: 18px 18px 14px;
        background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
        border-bottom: 1px solid rgba(36, 71, 143, 0.12);
        box-shadow: 0 2px 12px rgba(17, 34, 68, 0.03);
      }

      .brand {
        display: flex;
        gap: 18px;
        align-items: center;
        min-width: 0;
      }

      .wordmark {
        font-size: clamp(2rem, 3.8vw, 2.9rem);
        line-height: 0.9;
        font-weight: 500;
        letter-spacing: 0.03em;
        color: #303846;
        white-space: nowrap;
      }

      .brand-copy {
        min-width: 0;
        padding-left: 18px;
        border-left: 1px solid var(--line);
      }

      .brand-title {
        margin: 0;
        font-size: clamp(1.4rem, 2.2vw, 2rem);
        font-weight: 700;
      }

      .brand-subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .top-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .ghost-button {
        appearance: none;
        border: 1px solid rgba(36, 71, 143, 0.18);
        background: #fff;
        color: #363f4f;
        border-radius: 12px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(22, 38, 70, 0.05);
      }

      .ghost-button.primary {
        background: var(--navy);
        border-color: var(--navy);
        color: #fff;
      }

      .ghost-button:hover {
        border-color: rgba(36, 71, 143, 0.34);
      }

      .shell {
        max-width: 1380px;
        margin: 0 auto;
        padding: 22px 18px 54px;
      }

      .summary {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 18px;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .summary strong {
        color: var(--ink);
      }

      .summary-left,
      .summary-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .orders {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .empty {
        grid-column: 1 / -1;
        padding: 42px 24px;
        border-radius: 22px;
        background: #fff;
        border: 1px dashed rgba(36, 71, 143, 0.22);
        text-align: center;
        color: var(--muted);
      }

      .order {
        position: relative;
        display: flex;
        flex-direction: column;
        background: var(--card);
        border: 1px solid rgba(36, 71, 143, 0.12);
        border-radius: 16px;
        box-shadow: 0 6px 18px rgba(19, 43, 84, 0.05);
        overflow: hidden;
      }

      .order-body {
        padding: 15px 15px 10px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .order-head {
        display: block;
      }

      .order-number {
        margin: 0;
        font-size: 1.02rem;
        font-weight: 600;
        letter-spacing: 0;
        color: #2f3743;
      }

      .customer {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .customer-icon {
        font-size: 0.82rem;
      }

      .items {
        margin-top: 14px;
        font-size: 0.9rem;
        line-height: 1.45;
        color: #333d4d;
        min-height: 0;
      }

      .items ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .item-line {
        padding: 9px 10px;
        border-radius: 10px;
        background: var(--mist);
        border: 1px solid rgba(36, 71, 143, 0.08);
      }

      .item-name {
        color: #333d4d;
        font-weight: 600;
      }

      .item-meta {
        margin-top: 3px;
        font-size: 0.83rem;
        color: var(--muted);
      }

      .meta-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 12px;
        font-size: 0.84rem;
        color: #303846;
      }

      .price {
        font-size: 0.86rem;
        font-weight: 700;
        color: var(--navy-deep);
      }

      .source {
        color: var(--muted);
        font-weight: 600;
      }

      .time {
        color: var(--muted);
        font-weight: 600;
      }

      .order-footer {
        margin-top: auto;
        padding: 10px 15px 13px;
        border-top: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(238,243,251,0.72) 100%);
      }

      .foot-note {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 0.88rem;
        white-space: pre-wrap;
      }

      .aux {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(36, 71, 143, 0.08);
        color: var(--navy-deep);
        font-size: 0.75rem;
        font-weight: 600;
      }

      .tag.location {
        background: rgba(45, 109, 89, 0.1);
        color: var(--green-ink);
      }

      .tag.channel {
        background: rgba(36, 71, 143, 0.12);
        color: var(--navy-deep);
      }

      .sku-list {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }

      .sku-line {
        font-size: 0.8rem;
        color: var(--muted);
      }

      @media (max-width: 1180px) {
        .orders {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .brand {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .brand-copy {
          padding-left: 0;
          border-left: 0;
        }

        .orders {
          grid-template-columns: 1fr;
        }

        .summary {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="wordmark">A.I.STONE</div>
        <div class="brand-copy">
          <h1 class="brand-title">Transfers</h1>
          <p class="brand-subtitle">Compact view of fully unfulfilled Shopify orders</p>
        </div>
      </div>

        <div class="top-actions">
        <button class="ghost-button" type="button">Orders</button>
        <button class="ghost-button primary" id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <main class="shell">
      <section class="summary">
        <div class="summary-left">
          <span>◌</span>
          <strong id="order-count-label">0 orders</strong>
        </div>
        <div class="summary-right">
          <span>Last refresh:</span>
          <strong id="last-refresh">Loading…</strong>
        </div>
      </section>

      <section class="orders" id="orders"></section>
    </main>

    <script>
      const ordersEl = document.getElementById("orders");
      const refreshButton = document.getElementById("refresh");
      const orderCountLabelEl = document.getElementById("order-count-label");
      const lastRefreshEl = document.getElementById("last-refresh");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatTime(value) {
        if (!value) return "Unknown";
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }).format(new Date(value));
      }

      function formatMoney(amount, currency) {
        const numeric = Number(amount || 0);
        return new Intl.NumberFormat(undefined, {
          style: "currency",
          currency: currency || "USD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(numeric);
      }

      function formatLastRefresh() {
        return new Intl.DateTimeFormat(undefined, {
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit"
        }).format(new Date());
      }

      function summarizeItems(items) {
        return items
          .map((item) => {
            const qty = Number(item.quantity || 0);
            const left = `${qty}x ${item.title || "Item"}`;
            const right = item.variantTitle ? ` - ${item.variantTitle}` : "";
            return `${left}${right}`;
          })
          .join(", ");
      }

      function estimateUrgency(order) {
        const note = String(order.note || "").toLowerCase();
        const tags = String(order.tags || "").toLowerCase();
        return note.includes("tonight") || note.includes("urgent") || tags.includes("urgent");
      }

      function renderEmpty(message) {
        orderCountLabelEl.textContent = "0 orders";
        lastRefreshEl.textContent = formatLastRefresh();
        ordersEl.innerHTML = `<article class="empty">${escapeHtml(message)}</article>`;
      }

      function renderOrders(payload) {
        const orders = Array.isArray(payload.orders) ? payload.orders : [];
        orderCountLabelEl.textContent = `${orders.length} orders`;
        lastRefreshEl.textContent = formatLastRefresh();

        if (!payload.configured) {
          renderEmpty(payload.error || "Shopify is not configured.");
          return;
        }

        if (!orders.length) {
          renderEmpty("No fully unfulfilled Shopify orders found.");
          return;
        }

        ordersEl.innerHTML = orders
          .map((order) => {
            const customer = order.customerName || order.shippingName || order.email || order.phone || "Unknown customer";
            const amount = Number(order.totalPrice || 0);
            const location = [order.city, order.province].filter(Boolean).join(", ");
            const sourceName = String(order.sourceName || "").replace(/_/g, " ");

            return `
              <article class="order">
                <div class="order-body">
                  <div class="order-head">
                    <h2 class="order-number">${escapeHtml(order.name || "Order")}</h2>
                  </div>

                  <div class="customer"><span class="customer-icon">◌</span>${escapeHtml(customer)}</div>

                  <div class="items">
                    <ul>
                      ${(order.items || [])
                        .map(
                          (item) => `
                            <li class="item-line">
                              <div class="item-name">${escapeHtml(`${item.quantity || 0}x ${item.title || "Item"}`)}</div>
                              <div class="item-meta">
                                ${item.variantTitle ? escapeHtml(item.variantTitle) : ""}
                                ${item.sku ? `${item.variantTitle ? " · " : ""}${escapeHtml(item.sku)}` : ""}
                              </div>
                            </li>
                          `
                        )
                        .join("")}
                    </ul>
                  </div>

                  <div class="meta-row">
                    <span class="price">${escapeHtml(formatMoney(amount, order.currency))}</span>
                    ${sourceName ? `<span class="source">${escapeHtml(sourceName)}</span>` : ""}
                    <span class="time">${escapeHtml(formatTime(order.createdAt))}</span>
                  </div>
                </div>

                <div class="order-footer">
                  ${order.note ? `<p class="foot-note">${escapeHtml(order.note)}</p>` : `<p class="foot-note">${escapeHtml(location || "No note on this order.")}</p>`}
                  <div class="aux">
                    ${order.tags ? String(order.tags).split(",").map((tag) => `<span class="tag">${escapeHtml(tag.trim())}</span>`).join("") : ""}
                    ${location ? `<span class="tag location">${escapeHtml(location)}</span>` : ""}
                    ${sourceName ? `<span class="tag channel">${escapeHtml(sourceName)}</span>` : ""}
                    <span class="tag">${escapeHtml(order.fulfillmentStatus || "unfulfilled")}</span>
                  </div>
                  <div class="sku-list">
                    ${(order.items || [])
                      .filter((item) => item.sku)
                      .slice(0, 4)
                      .map((item) => `<div class="sku-line">${escapeHtml(item.sku)}${item.quantity ? ` · qty ${escapeHtml(item.quantity)}` : ""}</div>`)
                      .join("")}
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function loadTransfers() {
        try {
          const response = await fetch("/api/transfers", { cache: "no-store" });
          const payload = await response.json();
          renderOrders(payload);
        } catch (error) {
          renderEmpty(`Could not load Shopify orders: ${error.message}`);
        }
      }

      refreshButton.addEventListener("click", loadTransfers);
      loadTransfers();
    </script>
  </body>
</html>
