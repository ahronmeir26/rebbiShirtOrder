<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transfers</title>
    <style>
      :root {
        --bg: #f5f8ff;
        --panel: #ffffff;
        --panel-alt: #eef4ff;
        --ink: #314156;
        --muted: #66758a;
        --line: #c8d7ee;
        --accent: #24478f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }
      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 18px 40px;
      }
      .hero, .order {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 20px;
      }
      .hero {
        padding: 22px;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }
      .muted { color: var(--muted); }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 18px;
      }
      .stat {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        background: var(--panel-alt);
      }
      .label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .value {
        font-size: 1.5rem;
        font-weight: 700;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
      }
      .orders {
        display: grid;
        gap: 14px;
      }
      .order {
        padding: 18px;
      }
      .head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .name {
        font-size: 1.15rem;
        font-weight: 700;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .chip {
        border: 1px solid var(--line);
        background: var(--panel-alt);
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 0.9rem;
      }
      .items {
        margin-top: 14px;
        display: grid;
        gap: 8px;
      }
      .item {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #fafcff;
      }
      .status {
        color: var(--muted);
      }
      .empty {
        padding: 32px;
        text-align: center;
        border: 1px dashed var(--line);
        border-radius: 18px;
        background: var(--panel);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Transfers</h1>
        <p class="muted">Unfulfilled Shopify orders loaded independently from the phone-order system.</p>
        <div class="stats">
          <div class="stat">
            <div class="label">Orders</div>
            <div class="value" id="order-count">0</div>
          </div>
          <div class="stat">
            <div class="label">Items</div>
            <div class="value" id="item-count">0</div>
          </div>
          <div class="stat">
            <div class="label">Status</div>
            <div class="value" id="load-status" style="font-size:1rem">Loading…</div>
          </div>
        </div>
      </section>

      <div class="toolbar">
        <div class="status" id="message">Loading Shopify orders…</div>
        <button id="refresh">Refresh</button>
      </div>

      <section class="orders" id="orders"></section>
    </main>

    <script>
      const ordersEl = document.getElementById("orders");
      const orderCountEl = document.getElementById("order-count");
      const itemCountEl = document.getElementById("item-count");
      const loadStatusEl = document.getElementById("load-status");
      const messageEl = document.getElementById("message");
      const refreshButton = document.getElementById("refresh");

      function formatTime(value) {
        if (!value) return "Unknown";
        return new Intl.DateTimeFormat(undefined, { dateStyle: "medium", timeStyle: "short" }).format(new Date(value));
      }

      function renderEmpty(message) {
        ordersEl.innerHTML = `<article class="empty">${message}</article>`;
      }

      function renderOrders(payload) {
        const orders = Array.isArray(payload.orders) ? payload.orders : [];
        orderCountEl.textContent = String(orders.length);
        itemCountEl.textContent = String(
          orders.reduce((sum, order) => sum + Number(order.itemCount || 0), 0)
        );
        loadStatusEl.textContent = payload.configured ? "Connected" : "Missing config";
        messageEl.textContent = payload.error || (orders.length ? "Shopify orders loaded." : "No unfulfilled orders found.");

        if (!payload.configured) {
          renderEmpty(payload.error || "Shopify is not configured.");
          return;
        }

        if (!orders.length) {
          renderEmpty("No unfulfilled Shopify orders found.");
          return;
        }

        ordersEl.innerHTML = orders
          .map(
            (order) => `
              <article class="order">
                <div class="head">
                  <div>
                    <div class="name">${order.name || "Order"}</div>
                    <div class="muted">${formatTime(order.createdAt)}</div>
                  </div>
                  <div class="muted">${order.customerName || order.shippingName || order.email || order.phone || "Unknown customer"}</div>
                </div>
                <div class="chips">
                  <span class="chip">Fulfillment: ${order.fulfillmentStatus}</span>
                  <span class="chip">Financial: ${order.financialStatus}</span>
                  ${order.city ? `<span class="chip">${order.city}${order.province ? `, ${order.province}` : ""}</span>` : ""}
                  ${order.tags ? `<span class="chip">Tags: ${order.tags}</span>` : ""}
                </div>
                <div class="items">
                  ${order.items
                    .map(
                      (item) => `
                        <div class="item">
                          <strong>${item.title || "Item"}</strong>
                          ${item.variantTitle ? `<span class="muted"> · ${item.variantTitle}</span>` : ""}
                          <div class="muted">Qty ${item.quantity || 0}${item.sku ? ` · SKU ${item.sku}` : ""}</div>
                        </div>
                      `
                    )
                    .join("")}
                </div>
                ${order.note ? `<p class="muted">Note: ${order.note}</p>` : ""}
              </article>
            `
          )
          .join("");
      }

      async function loadTransfers() {
        try {
          messageEl.textContent = "Loading Shopify orders…";
          const response = await fetch("/api/transfers", { cache: "no-store" });
          const payload = await response.json();
          renderOrders(payload);
        } catch (error) {
          loadStatusEl.textContent = "Error";
          renderEmpty(`Could not load Shopify orders: ${error.message}`);
        }
      }

      refreshButton.addEventListener("click", loadTransfers);
      loadTransfers();
    </script>
  </body>
</html>
