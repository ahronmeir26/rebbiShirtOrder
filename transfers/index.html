<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A.I. Stone Transfers</title>
    <style>
      :root {
        --sky: #dce6f7;
        --sky-deep: #c7d8f4;
        --navy: #24478f;
        --navy-deep: #1c3668;
        --ink: #2b3441;
        --muted: #6f7785;
        --workspace: #eef2f7;
        --card: #ffffff;
        --line: #dde2ea;
        --mist: #f4f7fc;
        --mist-strong: #e7eefb;
        --green-ink: #2d6d59;
        --rose: #f3e3de;
        --sand: #f6eed8;
        --shadow: 0 8px 24px rgba(19, 43, 84, 0.05);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--workspace);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: center;
        padding: 22px 22px 18px;
        background: #ffffff;
        border-bottom: 1px solid rgba(36, 71, 143, 0.12);
        box-shadow: 0 1px 0 rgba(17, 34, 68, 0.03);
        position: relative;
      }

      .topbar::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 4px;
        background: var(--sky-deep);
      }

      .brand {
        display: flex;
        gap: 18px;
        align-items: center;
        min-width: 0;
      }

      .wordmark {
        font-size: clamp(2rem, 3.8vw, 3rem);
        line-height: 0.88;
        font-weight: 400;
        letter-spacing: 0.045em;
        color: #303846;
        white-space: nowrap;
      }

      .brand-copy {
        min-width: 0;
        padding-left: 18px;
        border-left: 1px solid var(--line);
      }

      .brand-title {
        margin: 0;
        font-size: clamp(1.35rem, 2vw, 1.85rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--navy-deep);
      }

      .brand-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .top-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .ghost-button {
        appearance: none;
        border: 1px solid rgba(36, 71, 143, 0.18);
        background: rgba(36, 71, 143, 0.04);
        color: #363f4f;
        border-radius: 999px;
        padding: 10px 15px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .ghost-button.primary {
        background: var(--navy);
        border-color: var(--navy);
        color: #fff;
      }

      .ghost-button:hover {
        border-color: rgba(36, 71, 143, 0.34);
      }

      .shell {
        max-width: 1380px;
        margin: 0 auto;
        padding: 22px 22px 54px;
      }

      .summary {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-bottom: 20px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .summary strong {
        color: var(--ink);
      }

      .summary-left,
      .summary-right {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .summary-left strong {
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--mist-strong);
        color: var(--navy-deep);
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .tabs,
      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .filters[hidden] {
        display: none;
      }

      .tab,
      .filter-chip {
        appearance: none;
        border: 1px solid rgba(36, 71, 143, 0.14);
        background: rgba(36, 71, 143, 0.05);
        color: var(--navy-deep);
        border-radius: 999px;
        padding: 8px 12px;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
      }

      .tab.active,
      .filter-chip.active {
        background: var(--navy);
        border-color: var(--navy);
        color: #fff;
      }

      .orders {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .empty {
        grid-column: 1 / -1;
        padding: 42px 24px;
        border-radius: 22px;
        background: #fff;
        border: 1px dashed rgba(36, 71, 143, 0.22);
        text-align: center;
        color: var(--muted);
      }

      .order {
        position: relative;
        display: flex;
        flex-direction: column;
        background: var(--card);
        border: 1px solid rgba(36, 71, 143, 0.12);
        border-radius: 14px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .order::before {
        content: "";
        display: block;
        height: 6px;
        background: var(--sky-deep);
      }

      .order:nth-child(3n + 2)::before {
        background: var(--sand);
      }

      .order:nth-child(3n + 3)::before {
        background: var(--rose);
      }

      .order-body {
        padding: 14px 14px 8px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .order-head {
        display: block;
      }

      .order-number {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 600;
        letter-spacing: 0;
        color: var(--navy-deep);
      }

      .customer {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .customer-icon {
        display: none;
      }

      .items {
        margin-top: 12px;
        font-size: 0.88rem;
        line-height: 1.45;
        color: #333d4d;
        min-height: 0;
      }

      .items ul {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 6px;
      }

      .item-line {
        padding: 8px 9px;
        border-radius: 9px;
        background: var(--mist);
        border: 1px solid rgba(36, 71, 143, 0.08);
      }

      .order:nth-child(3n + 2) .item-line {
        background: #faf7ef;
      }

      .order:nth-child(3n + 3) .item-line {
        background: #fbf4f2;
      }

      .item-name {
        color: #333d4d;
        font-weight: 500;
      }

      .item-meta {
        margin-top: 3px;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .stock-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      .stock-pill {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 600;
      }

      .stock-pill.good {
        background: rgba(45, 109, 89, 0.12);
        color: var(--green-ink);
      }

      .stock-pill.bad {
        background: rgba(168, 73, 73, 0.12);
        color: #8d3838;
      }

      .meta-row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 10px;
        font-size: 0.8rem;
        color: #303846;
      }

      .price {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--navy-deep);
      }

      .source {
        color: var(--muted);
        font-weight: 500;
      }

      .time {
        color: var(--muted);
        font-weight: 500;
      }

      .order-footer {
        margin-top: auto;
        padding: 10px 14px 12px;
        border-top: 1px solid var(--line);
        background: #ffffff;
      }

      .foot-note {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 0.82rem;
        white-space: pre-wrap;
      }

      .aux {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--mist-strong);
        color: var(--navy-deep);
        font-size: 0.72rem;
        font-weight: 500;
      }

      .tag.location {
        background: rgba(45, 109, 89, 0.1);
        color: var(--green-ink);
      }

      .tag.channel {
        background: rgba(36, 71, 143, 0.12);
        color: var(--navy-deep);
      }

      .sku-list {
        margin-top: 10px;
        display: grid;
        gap: 6px;
      }

      .sku-line {
        font-size: 0.76rem;
        color: var(--muted);
      }

      @media (max-width: 1180px) {
        .orders {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .brand {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }

        .brand-copy {
          padding-left: 0;
          border-left: 0;
        }

        .orders {
          grid-template-columns: 1fr;
        }

        .summary {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="wordmark">A.I.STONE</div>
        <div class="brand-copy">
          <h1 class="brand-title">Transfers</h1>
          <p class="brand-subtitle">Compact view of fully unfulfilled Shopify orders</p>
        </div>
      </div>

        <div class="top-actions">
        <button class="ghost-button" type="button">Orders</button>
        <button class="ghost-button primary" id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <main class="shell">
      <section class="summary">
        <div class="summary-left">
          <span>◌</span>
          <strong id="order-count-label">0 orders</strong>
        </div>
        <div class="summary-right">
          <span>Last refresh:</span>
          <strong id="last-refresh">Loading…</strong>
        </div>
      </section>

      <section class="controls">
        <div class="tabs">
          <button class="tab active" type="button" data-tab="orders">Orders</button>
          <button class="tab" type="button" data-tab="stock">Stock</button>
        </div>

        <div class="filters" id="filters" hidden>
          <button class="filter-chip active" type="button" data-filter="all">All stock items</button>
          <button class="filter-chip" type="button" data-filter="lakewood-pio">Not in stock in Lakewood but in stock at PIO</button>
        </div>
      </section>

      <section class="orders" id="orders"></section>
    </main>

    <script>
      const ordersEl = document.getElementById("orders");
      const refreshButton = document.getElementById("refresh");
      const orderCountLabelEl = document.getElementById("order-count-label");
      const lastRefreshEl = document.getElementById("last-refresh");
      const filtersEl = document.getElementById("filters");
      const tabs = Array.from(document.querySelectorAll("[data-tab]"));
      const filterButtons = Array.from(document.querySelectorAll("[data-filter]"));
      let latestPayload = null;
      let activeTab = "orders";
      let activeFilter = "all";

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatTime(value) {
        if (!value) return "Unknown";
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit"
        }).format(new Date(value));
      }

      function formatMoney(amount, currency) {
        const numeric = Number(amount || 0);
        return new Intl.NumberFormat(undefined, {
          style: "currency",
          currency: currency || "USD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(numeric);
      }

      function formatLastRefresh() {
        return new Intl.DateTimeFormat(undefined, {
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit"
        }).format(new Date());
      }

      function itemMatchesLakewoodPioFilter(order, item) {
        return Boolean(
          Number(item.stock?.lakewood?.available || 0) <= 0 &&
          Number(item.stock?.pio?.available || 0) > 0
        );
      }

      function renderEmpty(message) {
        orderCountLabelEl.textContent = "0 orders";
        lastRefreshEl.textContent = formatLastRefresh();
        ordersEl.innerHTML = `<article class="empty">${escapeHtml(message)}</article>`;
      }

      function renderOrdersTab(orders) {
        return orders
          .map((order) => {
            const customer = order.customerName || order.shippingName || order.email || order.phone || "Unknown customer";
            const amount = Number(order.totalPrice || 0);
            const location = [order.city, order.province].filter(Boolean).join(", ");
            const sourceName = String(order.sourceName || "").replace(/_/g, " ");

            return `
              <article class="order">
                <div class="order-body">
                  <div class="order-head">
                    <h2 class="order-number">${escapeHtml(order.name || "Order")}</h2>
                  </div>

                  <div class="customer"><span class="customer-icon">◌</span>${escapeHtml(customer)}</div>

                  <div class="items">
                    <ul>
                      ${(order.items || [])
                        .map(
                          (item) => `
                            <li class="item-line">
                              <div class="item-name">${escapeHtml(`${item.quantity || 0}x ${item.title || "Item"}`)}</div>
                              <div class="item-meta">
                                ${item.variantTitle ? escapeHtml(item.variantTitle) : ""}
                                ${item.sku ? `${item.variantTitle ? " · " : ""}${escapeHtml(item.sku)}` : ""}
                              </div>
                            </li>
                          `
                        )
                        .join("")}
                    </ul>
                  </div>

                  <div class="meta-row">
                    <span class="price">${escapeHtml(formatMoney(amount, order.currency))}</span>
                    ${sourceName ? `<span class="source">${escapeHtml(sourceName)}</span>` : ""}
                    <span class="time">${escapeHtml(formatTime(order.createdAt))}</span>
                  </div>
                </div>

                <div class="order-footer">
                  ${order.note ? `<p class="foot-note">${escapeHtml(order.note)}</p>` : `<p class="foot-note">${escapeHtml(location || "No note on this order.")}</p>`}
                  <div class="aux">
                    ${order.tags ? String(order.tags).split(",").map((tag) => `<span class="tag">${escapeHtml(tag.trim())}</span>`).join("") : ""}
                    ${location ? `<span class="tag location">${escapeHtml(location)}</span>` : ""}
                    ${sourceName ? `<span class="tag channel">${escapeHtml(sourceName)}</span>` : ""}
                    <span class="tag">${escapeHtml(order.fulfillmentStatus || "unfulfilled")}</span>
                  </div>
                  <div class="sku-list">
                    ${(order.items || [])
                      .filter((item) => item.sku)
                      .slice(0, 4)
                      .map((item) => `<div class="sku-line">${escapeHtml(item.sku)}${item.quantity ? ` · qty ${escapeHtml(item.quantity)}` : ""}</div>`)
                      .join("")}
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function renderStockTab(orders) {
        return orders
          .map((order) => {
            const customer = order.customerName || order.shippingName || order.email || order.phone || "Unknown customer";
            const matchingItems = (order.items || []).filter((item) => {
              if (activeFilter === "lakewood-pio") {
                return itemMatchesLakewoodPioFilter(order, item);
              }

              return true;
            });

            if (!matchingItems.length) {
              return "";
            }

            return `
              <article class="order">
                <div class="order-body">
                  <div class="order-head">
                    <h2 class="order-number">${escapeHtml(order.name || "Order")}</h2>
                  </div>

                  <div class="customer">${escapeHtml(customer)}</div>

                  <div class="items">
                    <ul>
                      ${matchingItems
                        .map(
                          (item) => `
                            <li class="item-line">
                              <div class="item-name">${escapeHtml(`${item.quantity || 0}x ${item.title || "Item"}`)}</div>
                              <div class="item-meta">
                                ${item.variantTitle ? escapeHtml(item.variantTitle) : ""}
                                ${item.sku ? `${item.variantTitle ? " · " : ""}${escapeHtml(item.sku)}` : ""}
                              </div>
                              <div class="stock-row">
                                <span class="stock-pill ${Number(item.stock?.lakewood?.available || 0) > 0 ? "good" : "bad"}">
                                  Lakewood ${escapeHtml(item.stock?.lakewood?.available || 0)}
                                </span>
                                <span class="stock-pill ${Number(item.stock?.pio?.available || 0) > 0 ? "good" : "bad"}">
                                  PIO ${escapeHtml(item.stock?.pio?.available || 0)}
                                </span>
                              </div>
                            </li>
                          `
                        )
                        .join("")}
                    </ul>
                  </div>
                </div>

                <div class="order-footer">
                  <div class="aux">
                    ${order.isLakewoodTagged ? `<span class="tag location">Lakewood order</span>` : ""}
                    <span class="tag">${escapeHtml(order.fulfillmentStatus || "unfulfilled")}</span>
                  </div>
                </div>
              </article>
            `;
          })
          .filter(Boolean)
          .join("");
      }

      function renderOrders(payload) {
        latestPayload = payload;
        const orders = Array.isArray(payload.orders) ? payload.orders : [];
        lastRefreshEl.textContent = formatLastRefresh();

        if (!payload.configured) {
          renderEmpty(payload.error || "Shopify is not configured.");
          return;
        }

        if (!orders.length) {
          renderEmpty("No fully unfulfilled Shopify orders found.");
          return;
        }

        const markup = activeTab === "stock" ? renderStockTab(orders) : renderOrdersTab(orders);
        const count = activeTab === "stock"
          ? (markup ? (markup.match(/<article class="order">/g) || []).length : 0)
          : orders.length;
        orderCountLabelEl.textContent = `${count} ${activeTab === "stock" ? "stock orders" : "orders"}`;
        filtersEl.hidden = activeTab !== "stock";
        ordersEl.innerHTML = markup || `<article class="empty">No matching stock items found.</article>`;
      }

      async function loadTransfers() {
        try {
          const response = await fetch("/api/transfers", { cache: "no-store" });
          const payload = await response.json();
          renderOrders(payload);
        } catch (error) {
          renderEmpty(`Could not load Shopify orders: ${error.message}`);
        }
      }

      tabs.forEach((tabButton) => {
        tabButton.addEventListener("click", () => {
          activeTab = tabButton.dataset.tab;
          tabs.forEach((button) => button.classList.toggle("active", button === tabButton));
          filtersEl.hidden = activeTab !== "stock";
          if (latestPayload) {
            renderOrders(latestPayload);
          }
        });
      });

      filterButtons.forEach((filterButton) => {
        filterButton.addEventListener("click", () => {
          activeFilter = filterButton.dataset.filter;
          filterButtons.forEach((button) => button.classList.toggle("active", button === filterButton));
          if (latestPayload) {
            renderOrders(latestPayload);
          }
        });
      });

      refreshButton.addEventListener("click", loadTransfers);
      loadTransfers();
    </script>
  </body>
</html>
